name: Auto Update Clash Rules

on:
  schedule:
    - cron: '20 20 * * *' # 每日北京时间凌晨 04:20 (UTC 20:20) 运行一次
  workflow_dispatch:      # 允许在 GitHub 页面上手动点击触发
  push:
    branches:
      - main
      - master

permissions:
  contents: write         # 允许写入仓库

jobs:
  update-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Scripts to Generate Lists
        run: |
          if [ -f generate_ai_list.py ]; then
            python generate_ai_list.py
          fi
          if [ -f generate_talkatone_list.py ]; then
            python generate_talkatone_list.py
          fi
          if [ -f generate_loyalsoldier_list.py ]; then
            python generate_loyalsoldier_list.py
          fi

      - name: Check for Changes
        id: git-check
        run: |
          git status
          git diff --quiet *.list || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and Push Changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add *.list
          git commit -m "Auto-update Clash rule lists [skip ci]"
          git push
